# Render Blueprint — import repo or apply manually in dashboard
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cortex-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
