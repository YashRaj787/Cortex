name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Run tests
        run: npm test
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
      - name: Check lint script
        id: lint
        run: |
          if npm pkg get scripts.lint | grep -q .; then
            echo "hasLint=true" >> $GITHUB_OUTPUT
          else
            echo "hasLint=false" >> $GITHUB_OUTPUT
          fi
        working-directory: frontend
      - name: Lint
        if: steps.lint.outputs.hasLint == 'true'
        run: npm run lint
        working-directory: frontend